<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ched's website</title>
    <style>
        :root {
            --bs-blue: #0d6efd;
            --bs-indigo: #6610f2;
            --bs-purple: #6f42c1;
            --bs-pink: #d63384;
            --bs-red: #dc3545;
            --bs-orange: #fd7e14;
            --bs-yellow: #ffc107;
            --bs-green: #198754;
            --bs-teal: #20c997;
            --bs-cyan: #0dcaf0;
            --bs-black: #000;
            --bs-white: #fff;
            --bs-gray: #6c757d;
            --bs-gray-dark: #343a40;
            --bs-gray-100: #f8f9fa;
            --bs-gray-200: #e9ecef;
            --bs-gray-300: #dee2e6;
            --bs-gray-400: #ced4da;
            --bs-gray-500: #adb5bd;
            --bs-gray-600: #6c757d;
            --bs-gray-700: #495057;
            --bs-gray-800: #343a40;
            --bs-gray-900: #212529;
            --bs-primary: #d63384;
            --bs-secondary: #6c757d;
            --bs-success: #198754;
            --bs-info: #0dcaf0;
            --bs-warning: #ffc107;
            --bs-danger: #dc3545;
            --bs-light: #f8f9fa;
            --bs-dark: #212529;
            --bs-primary-rgb: 13, 110, 253;
            --bs-secondary-rgb: 108, 117, 125;
            --bs-success-rgb: 25, 135, 84;
            --bs-info-rgb: 13, 202, 240;
            --bs-warning-rgb: 255, 193, 7;
            --bs-danger-rgb: 220, 53, 69;
            --bs-light-rgb: 248, 249, 250;
            --bs-dark-rgb: 33, 37, 41;
            --bs-white-rgb: 255, 255, 255;
            --bs-black-rgb: 0, 0, 0;
            --bs-body-color-rgb: 33, 37, 41;
            --bs-body-bg-rgb: 255, 255, 255;
            --bs-font-sans-serif: system-ui, -apple-system, "Segoe UI", Roboto,
                "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif,
                "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol",
                "Noto Color Emoji";
            --bs-font-monospace: SFMono-Regular, Menlo, Monaco, Consolas,
                "Liberation Mono", "Courier New", monospace;
            --bs-gradient: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.15),
                    rgba(255, 255, 255, 0));
            --bs-body-font-family: var(--bs-font-sans-serif);
            --bs-body-font-size: 1rem;
            --bs-body-font-weight: 400;
            --bs-body-line-height: 1.5;
            --bs-body-color: #212529;
            --bs-body-bg: #fff;
            --bs-border-width: 1px;
            --bs-border-style: solid;
            --bs-border-color: #dee2e6;
            --bs-border-color-translucent: rgba(0, 0, 0, 0.175);
            --bs-border-radius: 0.375rem;
            --bs-border-radius-sm: 0.25rem;
            --bs-border-radius-lg: 0.5rem;
            --bs-border-radius-xl: 1rem;
            --bs-border-radius-2xl: 2rem;
            --bs-border-radius-pill: 50rem;
            --bs-link-color: #0d6efd;
            --bs-link-hover-color: #0a58ca;
            --bs-code-color: #d63384;
            --bs-highlight-bg: #fff3cd;
        }

        .center-children {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-bg-dark {
            color: var(--bs-dark) !important;
            background-color: var(--bs-dark) !important;
        }

        .cover-container {
            max-width: 42em;
        }

        p {
            color: var(--bs-gray-100)
        }

        .gradient-bckgrnd {
            background: rgb(33, 37, 41);
            background: linear-gradient(80deg, rgba(33, 37, 41, 1) 10%, rgba(27, 30, 33, 1) 100%);
        }

        @keyframes fade {
            0% {
                opacity: 0;
                top: 20px;
            }

            100% {
                opacity: 100%;
                top: 0;
            }
        }

        @keyframes fadebot {
            0% {
                opacity: 0;
                bottom: 20px;
            }

            100% {
                opacity: 100%;
                bottom: 0;
            }
        }

        .fade-top {
            animation: fade 1.3s
        }

        .fade-bot {
            animation: fadebot 1.3s
        }
    </style>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
</head>

<body class="d-flex h-100 text-center text-bg-dark justify-content-center gradient-bckgrnd">
    <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">

        <header class="mb-auto fade-top">
            <div>
                <h3 style="color: var(--bs-code-color);" class="float-md-start mb-0">ched</h3>
                <nav class="nav nav-masthead justify-content-center float-md-end">
                    <a style="color: var(--bs-code-color);" class="nav-link fw-bold py-1 px-0 active" aria-current="page" href="#">home</a>
                    <p>_</p>
                    <a style="color: var(--bs-code-color);" class="nav-link fw-bold py-1 px-0" href="#">portfolio</a>
                    <p>_</p>
                    <a style="color: var(--bs-code-color);" class="nav-link fw-bold py-1 px-0" href="#">contact</a>
                </nav>
            </div>
        </header>

        <main style="padding: auto; margin: auto;" class="px-3 fade-bot align-items-center">
            <h1 style="color: var(--bs-gray-100);">hi, im ched.</h1>
            <p class="lead">
                this is my development website
            </p>
            <p class="lead">
                <a class="btn btn-lg btn-outline-info fw-bold shadow-lg" href="#">portfolio</a>
            </p>
        </main>

    </div>
</body>

</html>
